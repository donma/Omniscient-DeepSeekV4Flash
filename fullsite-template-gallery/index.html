<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omniscient — 全站樣板庫 | 90 套完整網站樣板</title>
<meta name="description" content="Omniscient 提供 90 套完整 12 頁網站樣板，涵蓋美容、餐飲、零售、專業服務等產業，每套附 AI Prompt 與下載。">
<meta property="og:title" content="Omniscient — 全站樣板庫">
<meta property="og:description" content="不是下載一個首頁，而是下載一整套可交付客戶的完整網站。">
<meta property="og:image" content="assets/img/og-image.jpg">
<link rel="canonical" href="https://omniscient-templates.com/">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link href="assets/css/gallery.css" rel="stylesheet">
</head>
<body>

<header class="gallery-header">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-lg-7">
        <h1 class="gallery-logo"><i class="bi bi-stars"></i>Omniscient</h1>
        <p class="gallery-subtitle">90 套完整網站樣板，每套 12 頁 · 附 AI Prompt · 可 ZIP 下載</p>
      </div>
      <div class="col-lg-5">
        <div class="header-stats">
          <span class="header-stat"><i class="bi bi-collection"></i> 90 Templates</span>
          <span class="header-stat"><i class="bi bi-file-earmark"></i> 12 Pages Each</span>
          <span class="header-stat"><i class="bi bi-download"></i> ZIP Ready</span>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="container gallery-container">
  <div class="row">

    <aside class="col-lg-3 sidebar">
      <div class="sidebar-inner">
        <div class="filter-section">
          <h5><i class="bi bi-search"></i>搜尋</h5>
          <div class="search-wrapper">
            <i class="bi bi-search"></i>
            <input type="text" class="search-input" id="searchInput" placeholder="輸入樣板名稱關鍵字...">
          </div>
        </div>

        <div class="filter-section">
          <h5><i class="bi bi-grid"></i>產業分類</h5>
          <div class="filter-tags" id="industryFilter">
            <span class="filter-tag active" data-filter="all">全部</span>
          </div>
        </div>

        <div class="filter-section">
          <h5><i class="bi bi-palette"></i>色系</h5>
          <div class="filter-tags" id="colorFilter">
            <span class="filter-tag active" data-filter="all">全部</span>
          </div>
        </div>

        <div class="filter-section">
          <h5><i class="bi bi-layout-three-columns"></i>版型</h5>
          <div class="filter-tags" id="layoutFilter">
            <span class="filter-tag active" data-filter="all">全部</span>
          </div>
        </div>

        <div class="filter-section">
          <h5><i class="bi bi-tags"></i>功能標籤</h5>
          <div class="filter-tags" id="featureFilter">
            <span class="filter-tag active" data-filter="all">全部</span>
          </div>
        </div>

        <div class="mt-3">
          <button class="btn btn-sm w-100" id="resetFilters"><i class="bi bi-arrow-counterclockwise"></i> 重設篩選</button>
        </div>
      </div>
    </aside>

    <main class="col-lg-9">
      <div class="toolbar">
        <div>
          <span class="result-count"><span id="resultCount">90</span> 套樣板</span>
        </div>
        <div class="view-toggle">
          <button class="btn btn-sm active" data-view="grid" title="網格檢視"><i class="bi bi-grid-3x3-gap-fill"></i></button>
          <button class="btn btn-sm" data-view="list" title="列表檢視"><i class="bi bi-list-ul"></i></button>
        </div>
      </div>

      <div class="row template-grid" id="templateGrid"></div>
    </main>
  </div>
</div>

<footer class="gallery-footer">
  <div class="container">
    <p class="mb-1">Omniscient Template Gallery &copy; 2026 · 90 套完整網站樣板 · 每套 12 頁 · 附 AI Prompt</p>
    <p class="mb-0">Designed with <a href="https://deepseek.com" target="_blank">DeepSeek V4 Flash</a></p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/gallery.js"></script>
</body>
</html>
