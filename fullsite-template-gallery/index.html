<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omniscient - 全站樣板庫 | 90 套完整網站樣板</title>
<meta name="description" content="Omniscient 提供 90 套完整 12 頁網站樣板，涵蓋美容、餐飲、零售、專業服務等產業，每套附 AI Prompt 與 ZIP 下載。">
<meta property="og:title" content="Omniscient - 全站樣板庫">
<meta property="og:description" content="不是下載一個首頁，而是下載一整套可交付客戶的完整網站。">
<meta property="og:image" content="assets/img/og-image.jpg">
<link rel="canonical" href="https://omniscient-templates.com/">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link href="assets/css/gallery.css" rel="stylesheet">
</head>
<body>

<header class="gallery-header">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-md-6">
        <h1 class="gallery-logo"><i class="bi bi-grid-3x3-gap-fill me-2"></i>Omniscient</h1>
        <p class="gallery-subtitle">90 套完整網站樣板 — 每套 12 頁、附 AI Prompt、可 ZIP 下載</p>
      </div>
      <div class="col-md-6 text-md-end mt-3 mt-md-0">
        <span class="badge bg-light text-dark me-2"><i class="bi bi-collection"></i> 90 Templates</span>
        <span class="badge bg-light text-dark me-2"><i class="bi bi-file-text"></i> 12 Pages Each</span>
        <span class="badge bg-light text-dark"><i class="bi bi-download"></i> ZIP Ready</span>
      </div>
    </div>
  </div>
</header>

<div class="container gallery-container">
  <div class="row">

    <aside class="col-lg-3 sidebar">
      <div class="sidebar-inner">
        <div class="filter-section">
          <h5><i class="bi bi-filter-left me-1"></i>產業分類</h5>
          <div class="filter-tags" id="industryFilter">
            <span class="filter-tag active" data-filter="all">全部</span>
          </div>
        </div>

        <div class="filter-section">
          <h5><i class="bi bi-palette me-1"></i>色系</h5>
          <div class="filter-tags" id="colorFilter">
            <span class="filter-tag active" data-filter="all">全部</span>
          </div>
        </div>

        <div class="filter-section">
          <h5><i class="bi bi-layout-three-columns me-1"></i>版型</h5>
          <div class="filter-tags" id="layoutFilter">
            <span class="filter-tag active" data-filter="all">全部</span>
          </div>
        </div>

        <div class="filter-section">
          <h5><i class="bi bi-tags me-1"></i>功能標籤</h5>
          <div class="filter-tags" id="featureFilter">
            <span class="filter-tag active" data-filter="all">全部</span>
          </div>
        </div>

        <div class="mt-3">
          <button class="btn btn-sm btn-outline-secondary w-100" id="resetFilters"><i class="bi bi-arrow-counterclockwise"></i> 重設篩選</button>
        </div>
      </div>
    </aside>

    <main class="col-lg-9">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <span class="result-count" id="resultCount">90</span> 套樣板
        </div>
        <div class="view-toggle">
          <button class="btn btn-sm btn-outline-secondary active" data-view="grid" title="網格檢視"><i class="bi bi-grid-3x3-gap-fill"></i></button>
          <button class="btn btn-sm btn-outline-secondary" data-view="list" title="列表檢視"><i class="bi bi-list-ul"></i></button>
        </div>
      </div>

      <div class="row template-grid" id="templateGrid"></div>
    </main>
  </div>
</div>

<footer class="gallery-footer">
  <div class="container text-center">
    <p class="mb-0">Omniscient Template Gallery &copy; 2026 &middot; 90 套完整網站樣板 &middot; 每套 12 頁 &middot; 附 AI Prompt</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/gallery.js"></script>
</body>
</html>
